# Gemini Code Assist Configuration for Totem Playground
# Docs: https://developers.google.com/gemini-code-assist/docs/customize-gemini-behavior-github

code_review:
  # Only HIGH+ severity issues trigger comments (not MEDIUM/LOW)
  comment_severity_threshold: HIGH
  # Limit comments per PR to reduce noise
  max_review_comments: 5
  pull_request_opened:
    help: false # Don't post help message on every PR
    summary: true # Post PR summary
    code_review: true # GCA ignores invoke commands when disabled, so must stay enabled
    include_drafts: true # Review draft PRs too

# File Exclusions (glob patterns)
ignore_patterns:
  # LanceDB artifacts
  - '**/.lancedb/**'
  - '**/.totem/**'

  # Dependencies
  - '**/node_modules/**'
  - 'pnpm-lock.yaml'
  - 'package-lock.json'

  # Test files (CR handles these, GCA adds noise)
  - '**/*.test.ts'
  - '**/*.spec.ts'

# Persistent memory
memory_config:
  disabled: false

have_fun: false